fullnameOverride: mimir

minio:
  enabled: false

mimir:
  structuredConfig:
    auth_enabled: false

    common:
      storage:
        backend: s3
        s3:
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}
        chunks_cache:
          backend: ""
    alertmanager_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}
    ruler_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    ingester:
      ring:
        replication_factor: 1
      walFlushCheckPeriod: 30s
      walReplayConcurrency: 1

    # Reduce compactor memory footprint
    compactor:
      sharding_ring:
        wait_stability_min_duration: 0s

    # Tune query path for low concurrency
    querier:
      max_concurrent: 2

    # Lower limits to reduce goroutine/memory overhead
    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 100000

# ── Disable optional components ──────────────────────────────────────────────
kafka:
  enabled: false
rollout_operator:
  enabled: false

# ── Stateful components ───────────────────────────────────────────────────────
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

storeGateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

# ── Stateless components ──────────────────────────────────────────────────────
distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

queryFrontend:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

queryScheduler:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

ruler:
  replicas: 0

overridesExporter:
  replicas: 0

# ── Gateway ───────────────────────────────────────────────────────────────────
gateway:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# ── Disable all caches ────────────────────────────────────────────────────────
chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false

# ── Disable meta-monitoring ───────────────────────────────────────────────────
metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

# ── Global env ────────────────────────────────────────────────────────────────
global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
    - name: GOMEMLIMIT
      value: "900MiB"
