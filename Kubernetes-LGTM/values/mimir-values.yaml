# =============================================================================
# mimir-values.yaml — grafana/mimir-distributed chart 6.0.5
# Single-node lab deployment with S3 storage
# =============================================================================

fullnameOverride: mimir

minio:
  enabled: false

kafka:
  enabled: false

rollout_operator:
  enabled: false


mimir:
  structuredConfig:

    usage_stats:
      enabled: false

    ingest_storage:
      enabled: false

    # -------------------------------------------------------------------------
    # Object Storage
    # -------------------------------------------------------------------------

    common:
      storage:
        backend: s3
        s3:
          endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_ALERTMANAGER}

    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_RULER}

    # -------------------------------------------------------------------------
    # Ingestion
    # -------------------------------------------------------------------------

    ingester:
      ring:
        replication_factor: 1
      push_grpc_method_enabled: true

    # -------------------------------------------------------------------------
    # Query configuration
    # -------------------------------------------------------------------------

    querier:
      max_concurrent: 8
      # Point directly to the query-frontend since the scheduler is disabled
      frontend_worker:
        scheduler_address: ""
        frontend_address: mimir-query-frontend-headless.monitoring.svc.cluster.local:9095

    frontend:
      parallelize_shardable_queries: true
      # Disable frontend looking for the scheduler
      scheduler_address: ""

    # -------------------------------------------------------------------------
    # Limits
    # -------------------------------------------------------------------------

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000

      max_global_series_per_user: 100000

      max_fetched_chunks_per_query: 200000
      max_fetched_series_per_query: 100000


# =============================================================================
# Component Scaling
# =============================================================================

ingester:
  replicas: 1

  zoneAwareReplication:
    enabled: false

  persistentVolume:
    enabled: false

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 600m
      memory: 1Gi


distributor:
  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi


querier:
  replicas: 1

  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi


query_frontend:
  replicas: 1

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

query_scheduler:
  replicas: 0

store_gateway:
  replicas: 1

  zoneAwareReplication:
    enabled: false

  persistentVolume:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi


compactor:
  replicas: 1

  persistentVolume:
    enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi


alertmanager:
  replicas: 1

  persistentVolume:
    enabled: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi


ruler:
  replicas: 0


overrides_exporter:
  replicas: 1

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi


gateway:
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi


# =============================================================================
# Cache configuration
# =============================================================================

chunks-cache:
  enabled: false

index-cache:
  enabled: false

metadata-cache:
  enabled: false

results-cache:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi


# =============================================================================
# Meta monitoring
# =============================================================================

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false


# =============================================================================
# Go runtime tuning & Environment Variables
# =============================================================================

global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
    - name: S3_REGION
      value: "us-east-1" # <-- UPDATE THIS
    - name: S3_BUCKET_MIMIR
      value: "my-mimir-bucket" # <-- UPDATE THIS
    - name: S3_BUCKET_MIMIR_ALERTMANAGER
      value: "my-mimir-alertmanager-bucket" # <-- UPDATE THIS
    - name: S3_BUCKET_MIMIR_RULER
      value: "my-mimir-ruler-bucket" # <-- UPDATE THIS
