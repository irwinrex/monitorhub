# =============================================================================
# mimir-values.yaml — grafana/mimir-distributed chart 6.0.5
# Single-node lab deployment with S3 storage
# =============================================================================
fullnameOverride: mimir

minio:
  enabled: false
kafka:
  enabled: false
rollout_operator:
  enabled: false

mimir:
  structuredConfig:
    ingest_storage:
      enabled: false
      kafka:
        address: ""

    usage_stats:
      enabled: false

    common:
      storage:
        backend: s3
        s3:
          endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_ALERTMANAGER}

    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_RULER}

    ingester:
      ring:
        replication_factor: 1
      push_grpc_method_enabled: true

    frontend:
      scheduler_address: ""

    frontend_worker:
      scheduler_address: ""

    querier:
      max_concurrent: 8

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 100000
      max_query_parallelism: 16
      query_sharding_total_shards: 8
      max_fetched_chunks_per_query: 2000000

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 512Mi

query_scheduler:
  replicas: 0

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

ruler:
  replicas: 0

overrides_exporter:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

gateway:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
    - name: GOMEMLIMIT
      value: "900MiB"
