# Mimir Values - Monolithic mode (single binary)
fullnameOverride: mimir

enabled: true
mode: monolithic
replicas: 1

persistence:
  enabled: false

server:
  http_listen_port: 8080
  grpc_listen_port: 9095

structuredConfig:
  auth_enabled: false

  common:
    storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${MIMIR_BLOCKS_BUCKET}

  blocks_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${MIMIR_BLOCKS_BUCKET}

  alertmanager_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${MIMIR_ALERTMANAGER_BUCKET}

  ruler_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${MIMIR_RULER_BUCKET}

  ingester:
    ring:
      replication_factor: 1

  compactor:
    retention_enabled: true

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
