# Mimir Values - Minimal Single Node
fullnameOverride: mimir

# Disable MinIO
minio:
  enabled: false

# Minimal Mimir config
mimir:
  structuredConfig:
    auth_enabled: false

    # Use S3 for all storage
    common:
      storage:
        backend: s3
        s3:
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    alertmanager_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    ruler_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    # Minimal ingester config
    ingester:
      ring:
        replication_factor: 1

# ── Disable all optional components ─────────────────────────────────────────────
kafka:
  enabled: false

rollout_operator:
  enabled: false

# ── Stateful components - 1 replica each, no PVC ───────────────────────────────
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false

storeGateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false

compactor:
  replicas: 1
  persistentVolume:
  enabled: false

# ── Stateless components ──────────────────────────────────────────────────────
distributor:
  replicas: 1

querier:
  replicas: 1

queryFrontend:
  replicas: 1

queryScheduler:
  replicas: 0

ruler:
  replicas: 0

overridesExporter:
  replicas: 0

# ── Gateway ───────────────────────────────────────────────────────────────────
gateway:
  replicas: 1

# ── Disable caches ──────────────────────────────────────────────────────────
chunks-cache:
  enabled: false

index-cache:
  enabled: false

metadata-cache:
  enabled: false

results-cache:
  enabled: false

# ── Disable meta-monitoring ───────────────────────────────────────────────────
metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

# ── Minimal resources ────────────────────────────────────────────────────────
global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 1Gi
