# =============================================================================
# mimir-values.yaml — grafana/mimir-distributed chart 6.0.5
# Single-node lab deployment with S3 storage
# FIX APPLIED: Redundant query_scheduler config removed.
# FIX APPLIED: Ruler component is now enabled.
# =============================================================================

fullnameOverride: mimir

minio:
  enabled: false
kafka:
  enabled: false
rollout_operator:
  enabled: false

mimir:
  structuredConfig:

    ingest_storage:
      enabled: false
      kafka:
        address: ""

    usage_stats:
      enabled: false

    common:
      storage:
        backend: s3
        s3:
          endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_ALERTMANAGER}

    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_RULER}

    ingester:
      ring:
        replication_factor: 1
      push_grpc_method_enabled: true

    # FIX: Removed the query_scheduler block as the component is disabled.
    # query_scheduler:
    #   service_discovery_mode: dns

    querier:
      max_concurrent: 2

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 100000

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

query_scheduler:
  replicas: 0

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# FIX: Ruler is now enabled with 1 replica.
ruler:
  replicas: 1
  # Adding a resource block for the newly enabled ruler.
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

overrides_exporter:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

gateway:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

chunks-cache:
  enabled: false
index-cache:
  enabled: false
metadata-cache:
  enabled: false
results-cache:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
    - name: GOMEMLIMIT
      value: "900MiB"
