# Mimir Values - Minimal/Single Binary
fullnameOverride: mimir

# Use standalone mode for minimal deployment
mode: standalone
replicas: 1

# Disable persistence (use S3)
persistence:
  enabled: false

# MinIO is not needed with external S3
minio:
  enabled: false

server:
  http_listen_port: 8080
  grpc_listen_port: 9095

# Structured config for S3
structuredConfig:
  auth_enabled: false

  common:
    storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

  blocks_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}/blocks

  alertmanager_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}/alertmanager

  ruler_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}/ruler

  ingester:
    ring:
      replication_factor: 1

  compactor:
    retention_enabled: true

# Set all components to minimal
alertmanager:
  replicas: 0

store_gateway:
  replicas: 0

overrides_exporter:
  replicas: 0

query_scheduler:
  replicas: 0

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 1000m
    memory: 2Gi
