# =============================================================================
# mimir-values.yaml — grafana/mimir-distributed chart 6.0.5
# Single-node lab deployment with S3 storage
# =============================================================================
fullnameOverride: mimir

minio:
  enabled: false

kafka:
  enabled: false

rollout_operator:
  enabled: false

mimir:
  structuredConfig:

    usage_stats:
      enabled: false

    ingest_storage:
      enabled: false

    common:
      storage:
        backend: s3
        s3:
          endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
          region: ${S3_REGION}
          bucket_name: ${S3_BUCKET_MIMIR}

    blocks_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

    alertmanager_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_ALERTMANAGER}

    ruler_storage:
      backend: s3
      s3:
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR_RULER}

    ingester:
      ring:
        replication_factor: 1
        zone_awareness_enabled: false
      push_grpc_method_enabled: true

    store_gateway:
      sharding_ring:
        zone_awareness_enabled: false

    alertmanager:
      sharding_ring:
        zone_awareness_enabled: false

    querier:
      max_concurrent: 8
      query_timeout: 2m

    frontend:
      parallelize_shardable_queries: true
      max_outstanding_per_tenant: 256

    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 100000

      max_query_parallelism: 8
      query_sharding_total_shards: 8

      max_fetched_chunks_per_query: 500000
      max_fetched_series_per_query: 100000

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  extraEnv:
    - name: GOMEMLIMIT
      value: "900MiB"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 600m
      memory: 1Gi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 256Mi

querier:
  replicas: 1
  extraEnv:
    - name: GOMEMLIMIT
      value: "900MiB"
  resources:
    requests:
      cpu: 300m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

query_frontend:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

query_scheduler:
  replicas: 1

store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  extraEnv:
    - name: GOMEMLIMIT
      value: "900MiB"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

ruler:
  replicas: 0

overrides_exporter:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

gateway:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

chunks-cache:
  enabled: false

index-cache:
  enabled: false

metadata-cache:
  enabled: false

results-cache:
  enabled: true
  default_validity: 10m
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
