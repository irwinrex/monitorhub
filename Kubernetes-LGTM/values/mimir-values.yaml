fullnameOverride: mimir

minio:
  enabled: false

mimir:
  common:
    storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${S3_BUCKET_MIMIR}

  blocks_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}

  alertmanager_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}

  ruler_storage:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket_name: ${S3_BUCKET_MIMIR}

  ingester:
    ring:
      replication_factor: 1

  querier:
    max_concurrent: 2

  limits:
    ingestion_rate: 10000
    ingestion_burst_size: 20000
    max_global_series_per_user: 100000

kafka:
  enabled: false

rollout_operator:
  enabled: false

ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

storeGateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

alertmanager:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

compactor:
  replicas: 1
  persistentVolume:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

distributor:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

querier:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

queryFrontend:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

queryScheduler:
  replicas: 0

ruler:
  replicas: 0

overridesExporter:
  replicas: 0

gateway:
  replicas: 1
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

chunks-cache:
  enabled: false

index-cache:
  enabled: false

metadata-cache:
  enabled: false

results-cache:
  enabled: false

metaMonitoring:
  serviceMonitor:
    enabled: false
  grafanaAgent:
    enabled: false

global:
  extraEnv:
    - name: GOMAXPROCS
      value: "2"
    - name: GOMEMLIMIT
      value: "900MiB"
