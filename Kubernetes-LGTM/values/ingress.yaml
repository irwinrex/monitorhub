# =============================================================================
# Ingress Configuration for HAProxy
#
# Architecture:
#   - Grafana  → /
#   - Mimir    → /metrics/... → mimir-gateway:80/...
#   - Loki     → /logs/...    → loki:3100/...
#   - Tempo    → /traces/...  → tempo:4318/...  (OTLP HTTP)
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:  "60s"
    haproxy.org/proxy-body-size: "50m"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimir-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:  "60s"
    haproxy.org/proxy-body-size: "50m"
    haproxy.org/path-rewrite:    "/metrics/(.*) /\1"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: mimir-gateway
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:  "60s"
    haproxy.org/proxy-body-size: "50m"
    haproxy.org/path-rewrite:    "/logs/(.*) /\1"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /logs
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:  "60s"
    haproxy.org/proxy-body-size: "50m"
    haproxy.org/path-rewrite:    "/traces/(.*) /\1"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /traces
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 4318
