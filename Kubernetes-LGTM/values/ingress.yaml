# =============================================================================
# LGTM Stack Ingress - HAProxy
#
# Grafana    → UI auth handled by Grafana
# Prometheus → Basic Auth
# Loki       → Basic Auth
# Tempo      → Basic Auth
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Grafana (UI ONLY — no ingress auth)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:

    haproxy.org/backend-config-snippet: |
      compression algo gzip
      compression type text/html text/plain text/css text/javascript application/javascript application/json
      compression minsize 256

    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      Referrer-Policy "strict-origin-when-cross-origin"

spec:
  ingressClassName: haproxy
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 80

---
# -----------------------------------------------------------------------------
# 2. Prometheus (Basic Auth)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:

    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: monitoring/lgtm-basic-auth

    haproxy.org/path-rewrite: "^/prometheus(/.*)? /\\1"

    haproxy.org/backend-config-snippet: |
      compression algo gzip
      compression type application/json application/x-protobuf
      compression minsize 256

    haproxy.org/timeout-server: "300s"

spec:
  ingressClassName: haproxy
  rules:
  - http:
      paths:
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus-kube-prometheus-prometheus
            port:
              number: 9090

---
# -----------------------------------------------------------------------------
# 3. Loki (Basic Auth)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingress
  namespace: monitoring
  annotations:

    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: monitoring/lgtm-basic-auth

    haproxy.org/path-rewrite: "^/logs(/.*)? /\\1"

    haproxy.org/backend-config-snippet: |
      compression algo gzip
      compression type application/json application/x-protobuf
      compression minsize 256

    haproxy.org/timeout-tunnel: "3600s"

spec:
  ingressClassName: haproxy
  rules:
  - http:
      paths:
      - path: /logs
        pathType: Prefix
        backend:
          service:
            name: loki
            port:
              number: 3100

---
# -----------------------------------------------------------------------------
# 4. Tempo (Basic Auth)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:

    haproxy.org/auth-type: basic-auth
    haproxy.org/auth-secret: monitoring/lgtm-basic-auth

    haproxy.org/path-rewrite: "^/tempo(/.*)? /\\1"

    haproxy.org/backend-config-snippet: |
      compression algo gzip
      compression type application/json application/x-protobuf
      compression minsize 256

    haproxy.org/timeout-server: "300s"

spec:
  ingressClassName: haproxy
  rules:
  - http:
      paths:
      - path: /tempo
        pathType: Prefix
        backend:
          service:
            name: tempo
            port:
              number: 3200
