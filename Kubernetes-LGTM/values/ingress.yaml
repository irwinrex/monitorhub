# =============================================================================
# Ingress Configuration for HAProxy
#
# Architecture:
#   - Grafana  → /              (public, security headers + gzip)
#   - Mimir    → /metrics/...  → mimir-gateway:80   (auth + rate limit)
#   - Loki     → /logs/...     → loki:3100           (auth + rate limit)
#   - Tempo    → /traces/...   → tempo:4318          (auth + rate limit)
#
# Auth secret must exist before applying:
#   htpasswd -c auth <username>
#   kubectl create secret generic lgtm-basic-auth \
#     --from-file=auth -n monitoring
# =============================================================================
---
# Grafana — browser UI
# No auth (Grafana handles its own login)
# Full security headers + gzip + conservative rate limit
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    # Gzip compression for browser assets
    haproxy.org/compression-algo:   "gzip"
    haproxy.org/compression-type:   "text/html text/plain text/css text/javascript application/javascript application/json application/xml"
    # Security headers
    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      X-XSS-Protection "1; mode=block"
      Referrer-Policy "strict-origin-when-cross-origin"
      Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
      Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'"
      Cross-Origin-Opener-Policy "same-origin"
      Cross-Origin-Resource-Policy "same-origin"
      Cross-Origin-Embedder-Policy "require-corp"
    # Rate limit — browser UI, 60 req/10s per IP
    haproxy.org/rate-limit-requests:    "500"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "100k"
    haproxy.org/rate-limit-status-code: "429"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
# Mimir — metrics ingestion/query
# Rate limit sized for Alloy remote_write + cAdvisor scrapes
# 25-30 agents * ~5 req/s burst = 150 req/10s headroom
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimir-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /metrics/api/v1/push → /api/v1/push
    haproxy.org/path-rewrite: "/mimir"
    # Basic auth
    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "lgtm-basic-auth"
    # Gzip for query responses
    haproxy.org/compression-algo: "gzip"
    haproxy.org/compression-type: "application/json application/x-protobuf"
    # Security headers — API endpoint, strict policy
    haproxy.org/response-set-header: |
      X-Content-Type-Options "nosniff"
      X-Frame-Options "DENY"
      Referrer-Policy "no-referrer"
      Content-Security-Policy "default-src 'none'"
      Cross-Origin-Opener-Policy "same-origin"
      Cross-Origin-Resource-Policy "same-origin"
      Cache-Control "no-store"
      Pragma "no-cache"
    # Rate limit — 25-30 agents pushing metrics + cAdvisor
    haproxy.org/rate-limit-requests:    "200"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: mimir-gateway
                port:
                  number: 80
---
# Loki — log ingestion/query
# Rate limit sized for Alloy log shipping from 25-30 sources
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /logs/loki/api/v1/push → /loki/api/v1/push
    haproxy.org/path-rewrite: "/loki"
    # Basic auth
    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "lgtm-basic-auth"
    # Gzip for query responses
    haproxy.org/compression-algo: "gzip"
    haproxy.org/compression-type: "application/json application/x-protobuf"
    # Security headers — API endpoint, strict policy
    haproxy.org/response-set-header: |
      X-Content-Type-Options "nosniff"
      X-Frame-Options "DENY"
      Referrer-Policy "no-referrer"
      Content-Security-Policy "default-src 'none'"
      Cross-Origin-Opener-Policy "same-origin"
      Cross-Origin-Resource-Policy "same-origin"
      Cache-Control "no-store"
      Pragma "no-cache"
    # Rate limit — 25-30 agents shipping logs
    haproxy.org/rate-limit-requests:    "500"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /logs
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
---
# Tempo — trace ingestion
# OTLP HTTP on port 4318
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /traces/... → /...
    haproxy.org/path-rewrite: "/tempo"
    # Basic auth
    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "lgtm-basic-auth"
    # Gzip for query responses
    haproxy.org/compression-algo: "gzip"
    haproxy.org/compression-type: "application/json application/x-protobuf"
    # Security headers — API endpoint, strict policy
    haproxy.org/response-set-header: |
      X-Content-Type-Options "nosniff"
      X-Frame-Options "DENY"
      Referrer-Policy "no-referrer"
      Content-Security-Policy "default-src 'none'"
      Cross-Origin-Opener-Policy "same-origin"
      Cross-Origin-Resource-Policy "same-origin"
      Cache-Control "no-store"
      Pragma "no-cache"
    # Rate limit — traces are low volume, 25-30 agents
    haproxy.org/rate-limit-requests:    "200"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /traces
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 4318
