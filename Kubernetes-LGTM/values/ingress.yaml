# =============================================================================
# Ingress Configuration for HAProxy
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimir-ingress
  namespace: monitoring
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /mimir
            pathType: Prefix
            backend:
              service:
                name: mimir-gateway
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
