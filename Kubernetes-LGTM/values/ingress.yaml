# =============================================================================
# Ingress Configuration for HAProxy
# Rate limiting, headers, and auth are scoped per-Ingress — not in the ConfigMap.
# =============================================================================
---
# Grafana — no basic auth (Grafana handles its own login)
# No rate limiting here: Grafana is browser-driven and human-facing.
# Rate limiting on the UI would lock out dashboards under normal load.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:    "60s"
    haproxy.org/proxy-body-size:   "50m"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
# LGTM API endpoints (Mimir, Loki, Tempo) — basic auth + rate limiting
# rate-limit-* annotations are Ingress/Service-scoped only.
# All four must be present together on the same object — never in the ConfigMap.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lgtm-api-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server:         "60s"
    haproxy.org/proxy-body-size:        "50m"
    # Rate limiting — all four annotations are required together on this object
    haproxy.org/rate-limit-requests:    "50"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "100k"
    haproxy.org/rate-limit-status-code: "429"
    # Security headers
    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      X-XSS-Protection "1; mode=block"
      Referrer-Policy "strict-origin-when-cross-origin"
    # Basic auth
    ingress.kubernetes.io/auth-type:   basic-auth
    ingress.kubernetes.io/auth-secret: grafana-basic-auth
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /mimir
            pathType: Prefix
            backend:
              service:
                name: mimir-gateway
                port:
                  number: 80
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 3200
