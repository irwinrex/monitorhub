# =============================================================================
# LGTM Stack Ingress - HAProxy
# Architecture:
#   - Grafana    → /              (Port 80)
#   - Prometheus → /prometheus    (Port 9090) - Rewrites to /
#   - Loki      → /logs          (Port 3100) - Rewrites to /
#   - Tempo     → /tempo        (Port 3200) - Rewrites to /
#
# Auth secret must exist before applying:
#   kubectl create secret generic lgtm-basic-auth \
#     --from-literal=<user>=$(openssl passwd -1 <password>) \
#     -n monitoring
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Grafana (UI) - with basic auth
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    # Auth
    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "monitoring/lgtm-basic-auth"

    # Compression
    haproxy.org/backend-config-snippet: |
      filter compression
      compression algo gzip
      compression type text/html text/plain text/css text/javascript application/javascript application/json application/xml

    # Security Headers
    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      Referrer-Policy "strict-origin-when-cross-origin"
      Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
      Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self'"
      Cross-Origin-Opener-Policy "same-origin-allow-popups"
      Cross-Origin-Resource-Policy "same-origin"
      Cross-Origin-Embedder-Policy "unsafe-none"

    # Rate Limit
    haproxy.org/rate-limit-requests:    "500"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "100k"
    haproxy.org/rate-limit-status-code: "429"

spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80

---
# -----------------------------------------------------------------------------
# 2. Prometheus (Metrics Ingestion/Query)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /prometheus/api/v1/push -> /api/v1/push
    haproxy.org/path-rewrite: "/prometheus/(.*) /\\1"

    # Auth
    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "monitoring/lgtm-basic-auth"

    # Backend Config
    haproxy.org/backend-config-snippet: |
      filter compression
      compression algo gzip
      compression type application/json application/x-protobuf
      timeout server 120s

    # Security Headers
    haproxy.org/response-set-header: |
      X-Frame-Options "DENY"
      X-Content-Type-Options "nosniff"
      Cache-Control "no-store"

    # Rate Limit
    haproxy.org/rate-limit-requests:    "200"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"

spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-prometheus
                port:
                  number: 9090

---
# -----------------------------------------------------------------------------
# 3. Loki (Log Ingestion/Query)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /logs/loki/api/v1/push -> /loki/api/v1/push
    haproxy.org/path-rewrite: "/logs/(.*) /\\1"

    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "monitoring/lgtm-basic-auth"

    haproxy.org/backend-config-snippet: |
      filter compression
      compression algo gzip
      compression type application/json application/x-protobuf
      # Loki Live Tail uses WebSockets — tunnel timeout must be high
      timeout tunnel 3600s

    haproxy.org/response-set-header: |
      X-Frame-Options "DENY"
      X-Content-Type-Options "nosniff"
      Cache-Control "no-store"

    # Rate Limit
    haproxy.org/rate-limit-requests:    "200"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"
    # haproxy.org/rate-limit-whitelist:   "10.0.0.0/8"  # <--- CHANGE to your agent CIDR

spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /logs
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100

---
# -----------------------------------------------------------------------------
# 4. Tempo (Trace Ingestion)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempo-ingress
  namespace: monitoring
  annotations:
    # Path rewrite: /tempo/v1/traces -> /v1/traces
    haproxy.org/path-rewrite: "/tempo/(.*) /\\1"

    haproxy.org/auth-type:   "basic-auth"
    haproxy.org/auth-secret: "monitoring/lgtm-basic-auth"

    haproxy.org/backend-config-snippet: |
      filter compression
      compression algo gzip
      compression type application/json application/x-protobuf

    haproxy.org/response-set-header: |
      X-Frame-Options "DENY"
      X-Content-Type-Options "nosniff"
      Cache-Control "no-store"

    # Rate Limit
    haproxy.org/rate-limit-requests:    "200"
    haproxy.org/rate-limit-period:      "10s"
    haproxy.org/rate-limit-size:        "200k"
    haproxy.org/rate-limit-status-code: "429"

spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 3200
