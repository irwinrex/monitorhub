fullnameOverride: loki

deploymentMode: SingleBinary

readinessProbe:
  httpGet:
    path: /ready
    port: 3100
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /ready
    port: 3100
  initialDelaySeconds: 120
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 5

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    size: 30Gi
    accessModes:
      - ReadWriteOnce
    storageClass: local-path

  podDisruptionBudget:
    enabled: true
    maxUnavailable: 0

# Disable distributed mode
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

gateway:
  enabled: false

lokiCanary:
  enabled: false

memcached:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# -----------------------------
# Loki Config
# -----------------------------
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info

  ingester:
    lifecycler:
      join_after: 0s
      observe_period: 0s
    wal:
      enabled: true
      dir: /var/loki/wal
      replay_memory_ceiling: 1GB
    chunk_idle_period: 5m
    chunk_retain_period: 1m

  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 5m
    retention_enabled: true
    delete_request_store: s3
    retention_delete_delay: 2h

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: your-loki-bucket
      ruler: your-loki-bucket
      admin: your-loki-bucket
    s3:
      region: us-east-1
      s3ForcePathStyle: false
      insecure: false
    config:
      chunk_prefix: "lgtm-prod/loki/chunks/"
      ruler_prefix: "lgtm-prod/loki/ruler/"
      admin_prefix: "lgtm-prod/loki/admin/"

  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_streams_per_user: 10000
    max_global_streams_per_user: 10000
    max_entries_limit_per_query: 5000
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    allow_structured_metadata: true

  querier:
    max_concurrent: 4

  query_scheduler:
    max_outstanding_requests_per_tenant: 2048

  frontend:
    max_outstanding_per_tenant: 2048

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 3
      memory: 4Gi

  service:
    type: ClusterIP
    port: 3100
