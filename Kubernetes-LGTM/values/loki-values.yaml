fullnameOverride: loki

test:
  enabled: false

mode: SingleBinary

write:
  enabled: false
read:
  enabled: false
backend:
  enabled: false

lokiCanary:
  enabled: false

monitoring:
  dashboards:
    enabled: false
  rules:
    enabled: false
  alerts:
    enabled: false
  serviceMonitor:
    enabled: false
  selfMonitoring:
    enabled: false

memcached:
  enabled: false
  memcachedExporter:
    enabled: false

chunksCache:
  enabled: false
resultsCache:
  enabled: false

auth_enabled: false

loki:
  commonConfig:
    replication_factor: 1
  prefix: "loki"
  storage:
    type: s3
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
      admin: ${S3_BUCKET}
    s3:
      region: ${S3_REGION}
      s3ForcePathStyle: true
      insecure: false
    config:
      chunk_prefix: "loki/chunks/"
      ruler_prefix: "loki/ruler/"
      admin_prefix: "loki/admin/"
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
        object_store_prefix: "loki"
  limits_config:
    retention_period: 720h
    allow_structured_metadata: true
    volume_enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  service:
    port: 3100
    type: ClusterIP
