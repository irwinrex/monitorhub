loki:
  enabled: true
  isDefault: true
  
  # Single binary mode - lightweight for single node
  commonConfig:
    replication_factor: 1
    path_prefix: /loki
    ring:
      kvstore:
        store: inmemory
  
  # Schema config for TSDB + S3
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  
  # S3 storage configuration
  storage:
    type: s3
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
      admin: ${S3_BUCKET}
    s3:
      region: ${S3_REGION}
      s3ForcePathStyle: true
      insecure: false
  
  # Disable unnecessary features for single node
  pattern_ingester:
    enabled: false
  
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  
  # Enable ruler API
  ruler:
    enable_api: true
  
  # Health probes
  readinessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 30
    timeoutSeconds: 1
    periodSeconds: 10
    failureThreshold: 3
  
  livenessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 30
    timeoutSeconds: 1
    periodSeconds: 10
    failureThreshold: 3
  
  # Resource limits - optimized for 4 vCPU node
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # Persistence for single binary
  persistence:
    enabled: true
    size: 30Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: local-path

  # Security context
  podSecurityContext:
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    fsGroup: 10001

# Disable other components
promtail:
  enabled: false

fluent-bit:
  enabled: false

grafana:
  enabled: false
