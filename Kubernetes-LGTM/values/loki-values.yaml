# Loki Values - Single Binary (Monolithic)
fullnameOverride: loki

singleBinary:
  enabled: true
  replicas: 1

lokiCanary:
  enabled: false

memcached:
  enabled: false

auth_enabled: false

commonConfig:
  replication_factor: 1

schemaConfig:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

storage:
  type: s3
  bucketNames:
    chunks: ${S3_BUCKET}/loki-chunks
    ruler: ${S3_BUCKET}/loki-ruler
    admin: ${S3_BUCKET}/loki-admin
  s3:
    region: ${S3_REGION}
    s3ForcePathStyle: true
    insecure: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
