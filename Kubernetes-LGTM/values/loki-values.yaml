fullnameOverride: loki
deploymentMode: SingleBinary

# -----------------------------
# Single Binary Configuration
# -----------------------------
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 30Gi
    accessModes:
      - ReadWriteOnce
    storageClass: local-path

  service:
    type: ClusterIP
    port: 3100
    targetPort: 3100
    protocol: TCP

  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      cpu: 3
      memory: 4Gi

# -----------------------------
# Loki Application Config
# -----------------------------
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  pattern_ingester:
    enabled: true

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 672h
    ingestion_rate_mb: 10
    ingestion_burst_size_mb: 20
    max_streams_per_user: 10000
    max_global_streams_per_user: 10000
    max_entries_limit_per_query: 5000
    reject_old_samples: true
    reject_old_samples_max_age: 168h

  ruler:
    enable_api: true

  server:
    http_listen_port: 3100
    grpc_listen_port: 9095
    log_level: info

  storage:
    type: s3
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
      admin: ${S3_BUCKET}
    s3:
      region: ${S3_REGION}
      s3ForcePathStyle: false
      insecure: false
    config:
      chunk_prefix: "lgtm/loki/chunks/"
      ruler_prefix: "lgtm/loki/ruler/"
      admin_prefix: "lgtm/loki/admin/"

  ingester:
    lifecycler:
      join_after: 0s
      observe_period: 0s
    wal:
      enabled: true
      dir: /var/loki/wal
      replay_memory_ceiling: 1GB
    chunk_idle_period: 5m
    chunk_retain_period: 1m

  compactor:
    working_directory: /var/loki/compactor
    compaction_interval: 5m
    retention_enabled: true
    delete_request_store: s3
    retention_delete_delay: 2h

  querier:
    max_concurrent: 4

  query_scheduler:
    max_outstanding_requests_per_tenant: 2048

  frontend:
    max_outstanding_per_tenant: 2048

# -----------------------------
# Zero out replica counts of other deployment modes
# -----------------------------
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0

# -----------------------------
# Disable Unused Components
# -----------------------------
gateway:
  enabled: false
test:
  enabled: false
