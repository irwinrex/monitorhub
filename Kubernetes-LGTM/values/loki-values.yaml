# Loki Values - Simple mode (single binary)
fullnameOverride: loki

mode: simple
replicas: 1

auth_enabled: false

commonConfig:
  replication_factor: 1

schemaConfig:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: loki_index_
        period: 24h

storage:
  type: s3
  bucketNames:
    chunks: LOKI_BUCKET_PLACEHOLDER
    ruler: LOKI_BUCKET_PLACEHOLDER-ruler
    admin: LOKI_BUCKET_PLACEHOLDER-admin
  s3:
    region: S3_REGION_PLACEHOLDER
    s3ForcePathStyle: true
    insecure: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
