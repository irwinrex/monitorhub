loki:
  commonConfig:
    replication_factor: 1
    ring:
      kvstore:
        store: inmemory
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
    lifecycler:
      ring:
        kvstore:
          store: inmemory
        replication_factor: 1
  tracing:
    enabled: true
  querier:
    max_concurrent: 2
  storage:
    type: s3
    bucketNames:
      chunks: ${S3_BUCKET}
      ruler: ${S3_BUCKET}
      admin: ${S3_BUCKET}
    s3:
      region: ${S3_REGION}
      s3ForcePathStyle: true
      insecure: false
  memberlist:
    enabled: false

deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  resources:
    limits:
      cpu: 2
      memory: 4Gi
    requests:
      cpu: 1
      memory: 2Gi
  extraEnv:
    - name: GOMEMLIMIT
      value: 3750MiB
    - name: MEMBERLIST_ENABLED
      value: "false"

# Disable unnecessary components
lokiCanary:
  enabled: false
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Keep all other components at 0
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
