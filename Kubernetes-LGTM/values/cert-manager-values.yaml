---
crds:
  enabled: true

replicaCount: 1

global:
  priorityClassName: system-cluster-critical
  leaderElection:
    namespace: cert-manager
    leaseDuration: 60s
    renewDeadline: 40s
    retryPeriod: 30s

resources:
  requests:
    cpu:    100m
    memory: 128Mi
  limits:
    cpu:    500m
    memory: 256Mi

podAnnotations:
  cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

podAntiAffinity:
  preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAntiAffinityTerm:
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: cert-manager
        topologyKey: kubernetes.io/hostname

webhook:
  replicaCount: 1
  resources:
    requests:
      cpu:    50m
      memory: 64Mi
    limits:
      cpu:    250m
      memory: 128Mi
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

cainjector:
  replicaCount: 1
  resources:
    requests:
      cpu:    50m
      memory: 64Mi
    limits:
      cpu:    250m
      memory: 128Mi
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

startupapicheck:
  enabled: false
