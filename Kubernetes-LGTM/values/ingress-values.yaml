# Ingress values for HAProxy (path-based routing)
# Applied automatically during LGTM deployment

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-main
  namespace: monitoring
  annotations:
    haproxy.org/timeout-connect: "10s"
    haproxy.org/timeout-client: "60s"
    haproxy.org/timeout-server: "60s"
    haproxy.org/rate-limit: "100"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lgtm-grafana
                port:
                  number: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mimir-api
  namespace: monitoring
  annotations:
    haproxy.org/timeout-connect: "10s"
    haproxy.org/timeout-server: "60s"
    haproxy.org/path-rewrite: "/mimir(.*) /$1"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /mimir
            pathType: Prefix
            backend:
              service:
                name: lgtm-mimir-gateway
                port:
                  number: 80

