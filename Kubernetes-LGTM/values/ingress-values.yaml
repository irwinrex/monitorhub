# Ingress values for HAProxy - HTTP only (path-based routing)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lgtm-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server: "60s"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lgtm-grafana
                port:
                  number: 3000
          - path: /api/v1/push
            pathType: Prefix
            backend:
              service:
                name: lgtm-mimir-gateway
                port:
                  number: 80
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: lgtm-loki
                port:
                  number: 3100
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: lgtm-tempo
                port:
                  number: 3200
