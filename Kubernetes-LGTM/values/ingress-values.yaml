# =============================================================================
# Kubernetes Ingress Configuration
# Routes external traffic to Grafana, Loki, Mimir, and Tempo services
# Uses HAProxy as the ingress controller
# =============================================================================
---
# Grafana - NO basic auth (Grafana handles its own login)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server: "60s"
    haproxy.org/proxy-body-size: "50m"
    # Rate limiting
    haproxy.org/rate-limit: "100"
    haproxy.org/rate-limit-requests: "50"
    # Security headers
    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      X-XSS-Protection "1; mode=block"
      Referrer-Policy "strict-origin-when-cross-origin"
      Strict-Transport-Security "max-age=31536000; includeSubDomains"
      Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:;"
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
---
# API endpoints (Mimir, Loki, Tempo) - WITH basic auth
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lgtm-api-ingress
  namespace: monitoring
  annotations:
    haproxy.org/timeout-server: "60s"
    haproxy.org/proxy-body-size: "50m"
    # Rate limiting
    haproxy.org/rate-limit: "100"
    haproxy.org/rate-limit-requests: "50"
    # Security headers
    haproxy.org/response-set-header: |
      X-Frame-Options "SAMEORIGIN"
      X-Content-Type-Options "nosniff"
      X-XSS-Protection "1; mode=block"
      Referrer-Policy "strict-origin-when-cross-origin"
      Strict-Transport-Security "max-age=31536000; includeSubDomains"
      Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https: wss:;"
    # Basic auth for API protection
    ingress.kubernetes.io/auth-type: basic-auth
    ingress.kubernetes.io/auth-secret: grafana-basic-auth
spec:
  ingressClassName: haproxy
  rules:
    - http:
        paths:
          - path: /mimir
            pathType: Prefix
            backend:
              service:
                name: mimir-gateway
                port:
                  number: 80
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: tempo
                port:
                  number: 3200
