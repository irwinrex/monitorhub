# =============================================================================
# Kubernetes Ingress Configuration
# Routes external traffic to Grafana, Loki, Mimir, and Tempo services
# Uses HAProxy as the ingress controller
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lgtm-ingress
  namespace: monitoring
  annotations:
    # HAProxy timeout settings
    haproxy.org/timeout-server: "60s"
spec:
  # Use HAProxy ingress class
  ingressClassName: haproxy
  
  # Routing rules
  rules:
    - http:
        paths:
          # Default route - goes to Grafana dashboard
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lgtm-grafana
                port:
                  number: 3000
          
          # Mimir metrics push endpoint
          - path: /api/v1/push
            pathType: Prefix
            backend:
              service:
                name: lgtm-mimir-gateway
                port:
                  number: 80
          
          # Loki log endpoint
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: lgtm-loki
                port:
                  number: 3100
          
          # Tempo trace endpoint
          - path: /tempo
            pathType: Prefix
            backend:
              service:
                name: lgtm-tempo
                port:
                  number: 3200
