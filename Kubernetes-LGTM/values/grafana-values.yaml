# =============================================================================
# grafana-values.yaml
# Helm chart: grafana/grafana 10.5.15
# Optimized for LGTM stack (Prometheus + Loki + Tempo)
# Expandable Controller Kubernetes cluster
# =============================================================================

replicas: 1

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"

# =============================================================================
# Admin credentials
# =============================================================================
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

# =============================================================================
# Persistence (dashboards, plugins, cache)
# =============================================================================
persistence:
  enabled: true
  type: pvc
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 5Gi
  finalizers:
    - kubernetes.io/pvc-protection

# =============================================================================
# Grafana core configuration
# =============================================================================
grafana.ini:
  analytics:
    reporting_enabled: false
    check_for_updates: false
    check_for_plugin_updates: false

  news:
    news_feed_enabled: false

  log:
    mode: console

  users:
    auto_assign_org: true
    auto_assign_org_role: Viewer

  security:
    disable_gravatar: true
    allow_embedding: false
    cookie_secure: false
    cookie_samesite: lax

  dashboards:
    default_home_dashboard_path: ""

  auth:
    disable_login_form: false

  server:
    enable_gzip: true
    router_logging: false

  unified_alerting:
    enabled: true
    ha_peers: ""

# =============================================================================
# Environment
# =============================================================================
env:
  GF_SECURITY_ALLOW_EMBEDDING: "false"
  GF_INSTALL_PLUGINS: ""

# =============================================================================
# Sidecar (auto-import dashboards & datasources)
# =============================================================================
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /var/lib/grafana/dashboards
    defaultFolderName: ""
    searchNamespace: monitoring

    provider:
      name: default
      orgId: 1
      folder: ""
      type: file

  datasources:
    enabled: true
    label: grafana_datasource
    labelValue: "1"
    searchNamespace: monitoring

# =============================================================================
# Datasources
# =============================================================================
datasources:
  datasources.yaml:
    apiVersion: 1

    datasources:
      # -----------------------------------------------------------------------
      # Prometheus (metrics)
      # -----------------------------------------------------------------------
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        isDefault: true

        jsonData:
          httpMethod: POST
          timeInterval: 60s
          manageAlerts: false
          prometheusType: Prometheus

      # -----------------------------------------------------------------------
      # Loki (logs)
      # -----------------------------------------------------------------------
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100

        jsonData:
          maxLines: 1000

      # -----------------------------------------------------------------------
      # Tempo (traces)
      # -----------------------------------------------------------------------
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200

        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false

          tracesToMetrics:
            datasourceUid: prometheus

          serviceMap:
            datasourceUid: prometheus

          nodeGraph:
            enabled: true

      # -----------------------------------------------------------------------
      # Alertmanager
      # -----------------------------------------------------------------------
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://prometheus-kube-prometheus-alertmanager.monitoring.svc.cluster.local:9093

        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false

# =============================================================================
# Plugins
# =============================================================================
plugins: []

# =============================================================================
# Resources (single-node cluster safe)
# =============================================================================
resources:
  requests:
    cpu: 150m
    memory: 512Mi

  limits:
    cpu: 500m
    memory: 1Gi

# =============================================================================
# Security context
# =============================================================================
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80
  targetPort: 3000

# =============================================================================
# ServiceMonitor
# =============================================================================
serviceMonitor:
  enabled: false
