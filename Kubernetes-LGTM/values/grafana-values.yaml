# =============================================================================
# grafana-values.yaml
# Helm chart: grafana/grafana 10.5.15
# Optimized for LGTM stack (Mimir + Loki + Tempo)
# Single-node Kubernetes cluster
# =============================================================================
replicas: 1
# =============================================================================
# Admin credentials
# =============================================================================
admin:
  existingSecret: grafana-admin
# =============================================================================
# Persistence
# =============================================================================
persistence:
  enabled: true
  type: pvc
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  size: 1Gi
# =============================================================================
# Grafana core configuration
# =============================================================================
grafana.ini:
  analytics:
    reporting_enabled: false
    check_for_updates: false
    check_for_plugin_updates: false
  news:
    news_feed_enabled: false
  feature_toggles:
    disable_news_panel: true
  log:
    mode: console
  users:
    auto_assign_org: true
    auto_assign_org_role: Viewer
  security:
    disable_gravatar: true
    cookie_secure: false
    cookie_samesite: lax
  dashboards:
    default_home_dashboard_path: ""
  auth:
    disable_login_form: false
  server:
    enable_gzip: true
# =============================================================================
# Datasources
# =============================================================================
datasources:
  datasources.yaml:
    apiVersion: 1

    datasources:
      # -------------------------------------------------------------------------
      # Mimir (metrics)
      # -------------------------------------------------------------------------
      - name: Mimir
        type: prometheus
        uid: mimir
        access: proxy
        url: http://mimir-gateway.monitoring.svc.cluster.local:80/prometheus
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 60s
      # -------------------------------------------------------------------------
      # Loki (logs)
      # -------------------------------------------------------------------------
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        jsonData:
          maxLines: 1000
      # -------------------------------------------------------------------------
      # Tempo (traces)
      # -------------------------------------------------------------------------
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.monitoring.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: false
          tracesToMetrics:
            datasourceUid: mimir
          serviceMap:
            datasourceUid: mimir
          nodeGraph:
            enabled: true
      # -------------------------------------------------------------------------
      # Alertmanager (Mimir embedded)
      # -------------------------------------------------------------------------
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://mimir-gateway.monitoring.svc.cluster.local:80/alertmanager
        jsonData:
          implementation: mimir
          handleGrafanaManagedAlerts: false
# =============================================================================
# Plugins
# =============================================================================
plugins: []
# =============================================================================
# Resource limits (single node cluster)
# =============================================================================
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi
# =============================================================================
# Security context
# =============================================================================
securityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472
# =============================================================================
# Service
# =============================================================================
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
# =============================================================================
# ServiceMonitor (disable unless using Prometheus Operator)
# =============================================================================
serviceMonitor:
  enabled: false
