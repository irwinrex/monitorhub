# Grafana Values
replicas: 1

admin:
  existingSecret: grafana-admin

persistence:
  enabled: false

grafana.ini:
  analytics:
    reporting_enabled: false
  log:
    mode: console

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Mimir
        type: prometheus
        url: grpc://mimir.monitoring.svc.cluster.local:9095
        isDefault: true
      - name: Loki
        type: loki
        url: grpc://loki.monitoring.svc.cluster.local:9095
      - name: Tempo
        type: tempo
        url: grpc://tempo.monitoring.svc.cluster.local:9096

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
