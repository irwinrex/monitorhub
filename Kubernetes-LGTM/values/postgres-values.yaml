# PostgreSQL values for CloudNativePG
# Used by install_Postgres.sh

---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-pg-superuser
  namespace: postgres
type: Opaque
stringData:
  username: postgres
  password: CHANGEME_PASSWORD

---
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-pg-app-secret
  namespace: postgres
type: Opaque
stringData:
  username: grafana
  password: CHANGEME_PASSWORD
  dbname: grafana

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: monitoring-pg
  namespace: postgres
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5.0
  
  primaryUpdateStrategy: unsupervised
  
  storage:
    size: 10Gi
    storageClassName: ""

  superuserSecret:
    name: monitoring-pg-superuser

  bootstrap:
    initdb:
      database: grafana
      owner: grafana
      secret:
        name: monitoring-pg-app-secret

  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
