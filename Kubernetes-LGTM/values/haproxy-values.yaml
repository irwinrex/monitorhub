# =============================================================================
# HAProxy Kubernetes Ingress Controller
# HTTP ONLY (port 80)
# DaemonSet + HostPort
# =============================================================================

controller:

  kind: DaemonSet

  daemonset:
    useHostNetwork: false
    useHostPort: true

    hostPorts:
      http: 80
      https: 0
      stat: 1024

  dnsPolicy: ClusterFirst

  ingressClass: haproxy

  ingressClassResource:
    name: haproxy
    enabled: true
    default: true

  service:
    enabled: false

  config:

    # Timeouts optimized for observability stack
    timeout-connect: "10s"
    timeout-client: "300s"
    timeout-server: "300s"
    timeout-http-request: "60s"
    timeout-keep-alive: "60s"

    # Loki live tail
    timeout-tunnel: "3600s"

    forwarded-for: "true"
    use-forwarded-headers: "true"

    # HTTP only
    ssl-redirect: "false"

    http-connection-mode: "http-keep-alive"

    dontlognull: "true"
    maxconn: "4000"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  healthCheck:
    nodePort: 0

  stats:
    enabled: true
    port: 1024
    auth: "admin:admin"

  metrics:
    enabled: true

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: Exists
      effect: NoSchedule


defaultBackend:

  enabled: true
  replicaCount: 1

  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
