# =============================================================================
# HAProxy Ingress Controller Configuration
# Global controller config only — routing lives in ingress.yaml
# =============================================================================
controller:
  kind: DaemonSet

  daemonset:
    useHostNetwork: false
    useHostPort: true
    hostPorts:
      http:  80
      https: 0
      stat:  1024

  dnsPolicy: ClusterFirst

  ingressClass: haproxy
  ingressClassResource:
    name:    haproxy
    enabled: true
    default: true

  service:
    enabled: false

  config:
    timeout-connect:       "10s"
    timeout-client:        "60s"
    timeout-server:        "60s"
    timeout-http-request:  "30s"
    timeout-keep-alive:    "30s"
    timeout-tunnel:        "3600s"
    forwarded-for:         "true"
    ssl-redirect:          "false"
    use-forwarded-headers: "true"
    http-connection-mode:  "http-server-close"
    dontlognull:           "true"
    maxconn:               "2000"

  resources:
    requests:
      cpu:    100m
      memory: 128Mi
    limits:
      cpu:    250m
      memory: 256Mi

  healthCheck:
    nodePort: 0

  stats:
    enabled: true
    port:    1024
    auth:  "admin:admin"

  metrics:
    enabled: true

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  tolerations:
    - key:      "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect:   "NoSchedule"

defaultBackend:
  enabled:      true
  replicaCount: 1
  resources:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
