# =============================================================================
# HAProxy Ingress Controller Configuration
# Global controller config only — routing and rate limiting live in ingress.yaml
# =============================================================================
controller:
  replicaCount: 1

  hostNetwork: true
  hostPorts:
    enable: true
    http:  80
    https: 0      # HTTPS disabled
    stat:  1024

  ingressClass: haproxy
  ingressClassResource:
    name: haproxy
    enabled: true
    default: true

  service:
    type: ClusterIP

  # Global HAProxy defaults — timeouts, connection options only.
  # Do NOT put rate-limit-* keys here. They are Ingress/Service-scoped
  # annotations and will cause validation errors when set globally without
  # a corresponding rate-limit-requests key in every reconciliation cycle.
  config:
    timeout-connect:       "10s"
    timeout-client:        "60s"
    timeout-server:        "60s"
    timeout-http-request:  "30s"
    timeout-keep-alive:    "30s"
    timeout-tunnel:        "3600s"
    forwarded-for:         "true"
    ssl-redirect:          "false"
    use-forwarded-headers: "true"
    http-connection-mode:  "http-server-close"
    dontlognull:           "true"
    maxconn:               "4000"

  resources:
    requests:
      cpu:    100m
      memory: 128Mi
    limits:
      cpu:    250m
      memory: 256Mi

  healthCheck:
    nodePort: 0

  stats:
    enabled: true
    port: 1024
    auth: "admin:admin"

  metrics:
    enabled: true

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAntiAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: haproxy
          topologyKey: kubernetes.io/hostname

defaultBackend:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
