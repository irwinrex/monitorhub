# =============================================================================
# HAProxy Ingress Controller Configuration
# =============================================================================

controller:
  # Number of HAProxy replicas
  replicaCount: 1

  # Use host network - binds directly to host ports
  hostNetwork: true
  hostPorts:
    enable: true
    http:   80    # HTTP port
    https:  0     # HTTPS disabled (using plain HTTP)
    stat:   1024  # Stats page port

  # Ingress class configuration
  ingressClass: haproxy
  ingressClassResource:
    name: haproxy
    enabled: true
    default: true  # Make this the default ingress class

  # Service type - ClusterIP for internal routing
  service:
    type: ClusterIP

  # HAProxy config
  config:
    timeout-connect: "10s"
    timeout-client:  "60s"
    timeout-server:  "60s"
    timeout-http-request: "30s"
    timeout-keep-alive: "30s"
    timeout-tunnel: "3600s"
    forwarded-for: "true"
    ssl-redirect: "false"
    use-forwarded-headers: "true"
    http-connection-mode: "http-server-close"
    option: "httpchk forwardfor httplog dontlognull redispatch"
    default-server: "inter 3s rise 2 fall 3"
    maxconn: "4000"

  # Resource limits
  resources:
    requests:
      cpu:    100m
      memory: 128Mi
    limits:
      cpu:    250m
      memory: 256Mi

  # Health check configuration
  healthCheck:
    nodePort: 0

  # Statistics page
  stats:
    enabled: true
    port: 1024
    auth: "admin:admin"

  # Prometheus metrics
  metrics:
    enabled: true

  # Pod annotations
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  # Tolerations - allow running on control plane
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  # Pod anti-affinity - prefer different nodes
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAntiAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: haproxy
          topologyKey: kubernetes.io/hostname

# Default backend - handles 404 errors
defaultBackend:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m,  memory: 128Mi }
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
