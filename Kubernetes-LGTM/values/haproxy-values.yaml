# =============================================================================
# HAProxy Ingress Controller Configuration
# Global controller config only — routing lives in ingress.yaml
# =============================================================================
controller:
  replicaCount: 1

  # Pod binds directly to the node NIC via hostNetwork.
  # External traffic bypasses the ClusterIP service entirely.
  # ClusterIP is kept for in-cluster health checks only.
  hostNetwork: true
  hostPorts:
    enable: true
    http:  80
    https: 0      # TLS not used — disable port binding entirely
    stat:  1024

  ingressClass: haproxy
  ingressClassResource:
    name:    haproxy
    enabled: true
    default: true

  service:
    type: ClusterIP   # Unused for external traffic; kept for in-cluster access

  # Global HAProxy defaults — timeouts and connection options only.
  # Do NOT add rate-limit-* keys here. They are Ingress-annotation-scoped
  # and will cause validation errors when set globally.
  config:
    timeout-connect:       "10s"
    timeout-client:        "60s"
    timeout-server:        "60s"
    timeout-http-request:  "30s"
    timeout-keep-alive:    "30s"
    timeout-tunnel:        "3600s"  # Reserved for future WebSocket/gRPC use
    forwarded-for:         "true"
    ssl-redirect:          "false"
    use-forwarded-headers: "true"
    http-connection-mode:  "http-server-close"
    dontlognull:           "true"
    maxconn:               "8000"   # Sized for concurrent Alloy metrics+logs+traces

  resources:
    requests:
      cpu:    100m
      memory: 128Mi
    limits:
      cpu:    250m
      memory: 256Mi

  healthCheck:
    nodePort: 0

  stats:
    enabled: true
    port:    1024
    auth:    "admin:changeme"   # TODO: replace with a strong password or external secret

  metrics:
    enabled: true

  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"

  # Allow scheduling onto control-plane nodes (required for single-node k0s)
  tolerations:
    - key:      "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect:   "NoSchedule"

  # podAntiAffinity intentionally omitted — only meaningful at replicaCount > 1

defaultBackend:
  enabled:      true
  replicaCount: 1
  resources:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m, memory: 128Mi }
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
