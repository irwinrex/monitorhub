# =============================================================================
# HAProxy Ingress Controller Configuration
# HAProxy routes incoming traffic to your services (Grafana, Loki, Mimir, Tempo)
# =============================================================================

controller:
  # Number of HAProxy replicas
  replicaCount: 1

  # Use host network - binds directly to host ports
  hostNetwork: true
  hostPorts:
    enable: true
    http:   80    # HTTP port
    https:  0     # HTTPS disabled (using plain HTTP)
    stat:   1024  # Stats page port

  # Ingress class configuration
  ingressClass: haproxy
  ingressClassResource:
    name: haproxy
    enabled: true
    default: true  # Make this the default ingress class

  # Service type - ClusterIP for internal routing
  service:
    type: ClusterIP

  # HAProxy timeout and option settings
  config:
    timeout-connect: "10s"         # Max time to connect to backend
    timeout-client:  "60s"          # Max time for client to send data
    timeout-server:  "60s"         # Max time for backend to respond
    timeout-http-request: "30s"    # Max time for HTTP request
    timeout-keep-alive: "30s"      # Keep-alive timeout
    timeout-tunnel: "3600s"       # Tunnel/websocket timeout
    forwarded-for: "true"          # Add X-Forwarded-For header
    ssl-redirect: "false"          # Don't redirect HTTP to HTTPS
    use-forwarded-headers: "true"  # Use forwarded headers
    http-server-close: "true"      # Close connection after response
    option: "httpchk forwardfor httplog dontlognull redispatch"
    default-server: "inter 3s rise 2 fall 3"  # Health check settings
    maxconn: "4000"                # Max connections per frontend

  # Extra HAProxy configuration - rate limiting stick table
  # Note: Security headers are now applied via Ingress annotations in ingress-values.yaml
  # to avoid HAProxy parsing errors with raw directives in extraConfig
  extraConfig: |
    # Rate limiting stick table - used by rate-limit annotations
    stick-table type ip size 100k expire 30s store conn_rate(30s),http_req_rate(30s)

  # Backend rate limiting annotations - applied to all backends
  extraBackendConfig:
    annotations:
      haproxy.org/rate-limit: "100"
      haproxy.org/rate-limit-requests: "50"

  # Extra service annotations - MUST include rate-limit-requests or HAProxy errors
  extraService:
    enabled: true
    annotations:
      haproxy.org/rate-limit: "100"
      haproxy.org/rate-limit-requests: "50"

  # Path-based routing backends (HTTP - mTLS handled by Linkerd)
  extraBackends:
    # Mimir API - metrics data
    mimir-backend:
      enabled: true
      endpoints:
        - http://mimir-gateway.monitoring.svc.cluster.local:80
      port: 80
      backendServerProtocol: HTTP
      pathRewrite: "/mimir(.*) /$1"
    # Loki - log data
    loki-backend:
      enabled: true
      endpoints:
        - http://loki.monitoring.svc.cluster.local:3100
      port: 3100
      backendServerProtocol: HTTP
      pathRewrite: "/loki(.*) /$1"
    # Tempo - trace data
    tempo-backend:
      enabled: true
      endpoints:
        - http://tempo.monitoring.svc.cluster.local:3200
      port: 3200
      backendServerProtocol: HTTP
      pathRewrite: "/tempo(.*) /$1"

  # Resource limits
  resources:
    requests:
      cpu:    100m   # Request 100 millicpus
      memory: 128Mi  # Request 128 MB RAM
    limits:
      cpu:    250m   # Max 250 millicpus
      memory: 256Mi  # Max 256 MB RAM

  # Health check configuration
  healthCheck:
    nodePort: 0

  # Statistics page
  stats:
    enabled: true
    port: 1024
    auth: "admin:admin"  # Username:password for stats page

  # Prometheus metrics
  metrics:
    enabled: true

  # Pod annotations
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"  # Don't evict during scale-down

  # Tolerations - allow running on control plane
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

  # Pod anti-affinity - prefer different nodes
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAntiAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: haproxy
          topologyKey: kubernetes.io/hostname

# Default backend - handles 404 errors
defaultBackend:
  enabled: true
  replicaCount: 1
  resources:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m,  memory: 128Mi }
  podAnnotations:
    cluster-autoscaler.kubernetes.io/safe-to-evict: "false"
