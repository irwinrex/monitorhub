fullnameOverride: tempo
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: false

tempo:
  auth_enabled: false
  server:
    http_listen_port: 3200
    grpc_listen_port: 9096
    log_level: info
  storage:
    trace:
      backend: s3
      s3:
        bucket: ${S3_BUCKET_TEMPO}
        region: ${S3_REGION}
  metricsGenerator:
    enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 30
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 60
  periodSeconds: 10
