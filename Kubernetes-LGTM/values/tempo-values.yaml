fullnameOverride: tempo
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: false

tempo:
  auth_enabled: false
  server:
    http_listen_port: 3200
    grpc_listen_port: 9096
    log_level: info
  storage:
    trace:
      backend: s3
      s3:
        bucket: ${S3_BUCKET}        # plain bucket name only — no path suffix
        prefix: tempo               # use prefix to namespace within shared bucket
        region: ${S3_REGION}
      wal:
        path: /var/tempo/wal        # explicit WAL path — required for single binary S3 backend
  metricsGenerator:
    enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 90
  periodSeconds: 10
  failureThreshold: 5
