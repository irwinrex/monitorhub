# Tempo Values - Monolithic
fullnameOverride: tempo

mode: monolithic
replicas: 1

persistence:
  enabled: false

storage:
  trace:
    backend: s3
    s3:
      region: ${S3_REGION}
      bucket: ${S3_BUCKET}/tempo

server:
  http_listen_port: 3200
  grpc_listen_port: 9096

config:
  auth_enabled: false

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
