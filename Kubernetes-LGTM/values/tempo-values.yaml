fullnameOverride: tempo
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: false

tempo:
  auth_enabled: false
  server:
    http_listen_port: 3200
    grpc_listen_port: 9096
    log_level: info
  storage:
    trace:
      backend: s3
      s3:
        bucket: ${S3_BUCKET_TEMPO}
        region: ${S3_REGION}
        endpoint: s3.dualstack.${S3_REGION}.amazonaws.com   # required — Tempo uses MinIO client, not AWS SDK
        insecure: false
      wal:
        path: /var/tempo/wal
  metricsGenerator:
    enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

readinessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

livenessProbe:
  httpGet:
    path: /ready
    port: 3200
  initialDelaySeconds: 120
  periodSeconds: 10
  failureThreshold: 5
