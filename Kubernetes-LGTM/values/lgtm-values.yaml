# LGTM Stack Values - S3 Backend Configuration
# Uses IAM role for S3 access (no credentials needed)
# Pod-to-pod communication via gRPC
# All S3 config via environment variables

---
# Loki
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1
    storage:
      type: s3
      s3:
        region: ${S3_REGION}
        s3ForcePathStyle: true
        insecure: false

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: ${LOKI_CHUNKS_BUCKET}
      ruler: ${LOKI_RULER_BUCKET}
      admin: ${LOKI_ADMIN_BUCKET}
    s3:
      region: ${S3_REGION}
      s3ForcePathStyle: true
      insecure: false

  server:
    grpc_listen_port: 9096

  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32

  singleBinary:
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 800m
        memory: 1Gi

---
# Tempo
tempo:
  replicas: 1
  persistence:
    enabled: false

  storage:
    trace:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket: ${TEMPO_BUCKET}

  server:
    http_listen_port: 3200
    grpc_listen_port: 9096

  config:
    auth_enabled: false

    distributor:
      receivers:
        jaeger:
          protocols:
            thrift_http: {}
            grpc: {}
            thrift_binary: {}
        otlp:
          protocols:
            http: {}
            grpc: {}

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 24h

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

---
# Mimir
mimir:
  enabled: true

  persistence:
    enabled: false

  server:
    grpc_listen_port: 9095

  structuredConfig:
    auth_enabled: false

    common:
      storage:
        backend: s3
        s3:
          region: ${S3_REGION}
          bucket_name: ${MIMIR_BLOCKS_BUCKET}

    blocks_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${MIMIR_BLOCKS_BUCKET}

    alertmanager_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${MIMIR_ALERTMANAGER_BUCKET}

    ruler_storage:
      backend: s3
      s3:
        region: ${S3_REGION}
        bucket_name: ${MIMIR_RULER_BUCKET}

    ingester:
      ring:
        replication_factor: 1

    compactor:
      retention_enabled: true

  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 800m
      memory: 1Gi

---
# Grafana
grafana:
  replicas: 1

  admin:
    existingSecret: grafana-admin

  persistence:
    enabled: false

  grafana.ini:
    analytics:
      reporting_enabled: false

    log:
      mode: console

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Mimir
          type: prometheus
          url: http://lgtm-mimir-gateway.monitoring.svc.cluster.local/prometheus
          isDefault: true

        - name: Loki
          type: loki
          url: http://lgtm-loki.monitoring.svc.cluster.local:3100

        - name: Tempo
          type: tempo
          url: http://lgtm-tempo.monitoring.svc.cluster.local:3200

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
