# LGTM Stack Values - S3 Backend Configuration
# Uses IAM role for S3 access (no credentials needed)

---
# Loki
loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: s3
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      region: us-east-1
      s3ForcePathStyle: true
      insecure: false

  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 300m
        memory: 512Mi
      limits:
        cpu: 800m
        memory: 1Gi

---
# Tempo
tempo:
  replicas: 1

  storage:
    trace:
      backend: s3
      s3:
        region: us-east-1
        bucket: tempo-traces

  config:
    auth_enabled: false

    server:
      http_listen_port: 3200
      grpc_listen_port: 9096

    distributor:
      receivers:
        jaeger:
          protocols:
            thrift_http: {}
            grpc: {}
            thrift_binary: {}
        otlp:
          protocols:
            http: {}
            grpc: {}

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 24h

  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

---
# Mimir
mimir:
  enabled: true

  structuredConfig:
    auth_enabled: false

    common:
      storage:
        backend: s3
        s3:
          region: us-east-1
          bucket_name: mimir-blocks

    blocks_storage:
      backend: s3
      s3:
        region: us-east-1
        bucket_name: mimir-blocks

    alertmanager_storage:
      backend: s3
      s3:
        region: us-east-1
        bucket_name: mimir-alertmanager

    ruler_storage:
      backend: s3
      s3:
        region: us-east-1
        bucket_name: mimir-ruler

    ingester:
      ring:
        replication_factor: 1

    compactor:
      retention_enabled: true

  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 800m
      memory: 1Gi

---
# Grafana
grafana:
  replicas: 1

  admin:
    existingSecret: grafana-admin

  persistence:
    enabled: false

  grafana.ini:
    analytics:
      reporting_enabled: false

    log:
      mode: console

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Mimir
          type: prometheus
          url: http://lgtm-mimir-gateway.monitoring.svc.cluster.local/prometheus
          isDefault: true

        - name: Loki
          type: loki
          url: http://lgtm-loki.monitoring.svc.cluster.local:3100

        - name: Tempo
          type: tempo
          url: http://lgtm-tempo.monitoring.svc.cluster.local:3200

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
