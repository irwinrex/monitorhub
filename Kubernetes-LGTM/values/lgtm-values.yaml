# Loki values - Single binary mode
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: "loki-chunks"
      ruler: "loki-ruler"
      admin: "loki-admin"
    s3:
      region: us-east-1
      s3ForcePathStyle: false
  limits_config:
    retention_period: 720h

singleBinary:
  replicas: 1

---
# Tempo values
tempo:
  replicas: 1
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-traces
        region: us-east-1

---
# Mimir values
mimir:
  enabled: true
  storage:
    bucket_name: mimir-data
  structuredConfig:
    limits:
      max_global_series_per_metric: 10000
    store_gateway:
      sharding_ring:
        replication_factor: 1

---
# Grafana values
grafana:
  replicas: 1
  admin:
    existingSecret: grafana-admin
  persistence:
    enabled: false
