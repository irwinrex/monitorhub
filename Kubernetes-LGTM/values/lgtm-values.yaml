# Minimal LGTM values - Top-level keys for each chart
# S3 bucket/region will be injected by install_LGTM.sh

---
# Loki
loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: s3
    bucketNames:
      chunks: "lgtm-observability"
      ruler: "lgtm-observability"
      admin: "lgtm-observability"
    s3:
      region: us-east-1
      s3ForcePathStyle: false
  limits_config:
    retention_period: 720h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32

singleBinary:
  replicas: 1

---
# Tempo
tempo:
  replicas: 1
  storage:
    trace:
      backend: s3
      s3:
        bucket: lgtm-observability
        region: us-east-1

---
# Mimir
mimir:
  enabled: true
  structuredConfig:
    runtime_config:
      file: /var/mimir/runtime.yaml
    limits:
      max_global_series_per_metric: 10000
      max_global_bytes: 536870912
    ingester:
      max_ingested_series: 2000
    store_gateway:
      sharding_ring:
        replication_factor: 1
    compactor:
      retention_enabled: true
    analytics:
      enabled: false
  storage:
    bucket_name: lgtm-observability

---
# Grafana
grafana:
  replicas: 1
  admin:
    existingSecret: grafana-admin
  persistence:
    type: pvc
    enabled: false
