# =============================================================================
# prometheus-values.yaml — prometheus-community/kube-prometheus-stack v58.0.0
# Prometheus with 90-day retention in local PVC
# =============================================================================

# --- Disable components we don't need ---
grafana:
  enabled: false

# =============================================================================
# Alertmanager Configuration
# =============================================================================
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi # Alertmanager state (silences, notifications)
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Prometheus Server Configuration
# =============================================================================
prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1

    # --- Retention Configuration ---
    # 90 days total queryable retention in local PVC
    retention: 90d

    # --- Local Storage ---
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi

    # --- Resource Allocation ---
    resources:
      requests:
        cpu: 400m
        memory: 2Gi
      limits:
        cpu: "1500m"
        memory: 4Gi

    additionalScrapeConfigs: []

# =============================================================================
# Other Components
# =============================================================================
kube-state-metrics:
  enabled: true
  replicas: 1

prometheus-node-exporter:
  enabled: true
  daemonset:
    replicas: 1

prometheusOperator:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
