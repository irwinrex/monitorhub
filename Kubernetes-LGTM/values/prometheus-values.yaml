# =============================================================================
# prometheus-values.yaml — prometheus-community/kube-prometheus-stack v58.0.0
# Prometheus with 30-day retention in local PVC
# =============================================================================

grafana:
  enabled: false

# =============================================================================
# Alertmanager Configuration
# =============================================================================
alertmanager:
  enabled: true
  alertmanagerSpec:
    replicas: 1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# =============================================================================
# Prometheus Server Configuration
# =============================================================================
prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
    retention: 30d
    thanos:
      image: thanosio/thanos:v0.36.1
      version: v0.36.1
      objectStorageConfig:
        config:
          type: S3
          config:
            bucket: ${S3_BUCKET_PROMETHEUS}
            endpoint: s3.dualstack.${S3_REGION}.amazonaws.com
            region: ${S3_REGION}
            insecure: false
            signature_version2: false
    enableRemoteWriteReceiver: true
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 30Gi
    resources:
      requests:
        cpu: 400m
        memory: 2Gi
      limits:
        cpu: "1500m"
        memory: 4Gi
    additionalScrapeConfigs: []

# =============================================================================
# Other Components
# =============================================================================
kube-state-metrics:
  enabled: true
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

prometheus-node-exporter:
  enabled: true
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

prometheusOperator:
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  admissionWebhooks:
    patch:
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
