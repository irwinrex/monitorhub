services:
  app:
    build:
      context: ../test
      dockerfile: ../Dockerfiles/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ../test:/app
      - app_logs:/app/logs
    ports:
      - "${APP_PORT}:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.4.7
    restart: unless-stopped
    command: >
      mysqld 
      --mysql-native-password=ON 
      --authentication-policy=mysql_native_password,,
    env_file:
      - .env
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    command: ["run", "--server.http.listen-addr=0.0.0.0:${ALLOY_PORT}", "/etc/alloy/config.alloy"]
    env_file:
      - .env
    environment:
      - ALLOY_SERVICE_NAMES=${ALLOY_SERVICE_NAMES}
      - ALLOY_ENVIRONMENT=${ALLOY_ENVIRONMENT}
      - ALLOY_HOST_IP=${HOST_IP}
    volumes:
      - ../test/alloy:/etc/alloy
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/rootfs:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /sys:/sys:ro
      - /var/run:/var/run:ro
    ports:
      - "${ALLOY_PORT}:${ALLOY_PORT}"
      - "9100:9100"
    networks:
      - monitoring
    privileged: true
    deploy:
      resources:
        limits:
          memory: 100M
          cpus: "0.25"

volumes:
  db_data:
  app_logs:

networks:
  monitoring:
    driver: bridge
